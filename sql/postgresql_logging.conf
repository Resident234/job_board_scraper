# =============================================================================
# PostgreSQL logging for JobBoardScraper (Windows / local dev)
# =============================================================================
#
# How to apply on Windows:
#
# 1) Find postgresql.conf:
#    - Default install: C:\Program Files\PostgreSQL\<version>\data\postgresql.conf
#    - Or run in psql:
#        SHOW config_file;
#
# 2) Append at the end of postgresql.conf:
#        include 'H:/s/Work_job_board_scraper/job_board_scraper/sql/postgresql_logging.conf'
#    (Use forward slashes in the path inside include.)
#
# 3) Reload config (no restart required for most logging settings):
#        SELECT pg_reload_conf();
#    Or from elevated cmd:
#        pg_ctl reload -D "C:\Program Files\PostgreSQL\16\data"
#
# 4) Log files location (see log_directory below):
#    H:\s\Work_job_board_scraper\job_board_scraper\logs\
#
#    IMPORTANT on Windows:
#    - Create the folder if it does not exist (PostgreSQL will not always create parents).
#    - The PostgreSQL Windows service account (often "NETWORK SERVICE" or
#      "NT AUTHORITY\NetworkService", or a dedicated postgres user) must have
#      Modify/Write permission on that folder.
#    - Changing log_directory usually requires a full service restart, not only
#      pg_reload_conf():
#        net stop postgresql-x64-16
#        net start postgresql-x64-16
#
# 5) Revert: comment out the include line and restart/reload again.
#
# Notes:
# - Server logs SQL text and duration, NOT result rows or before/after row state.
# - log_statement = 'mod'  -> INSERT, UPDATE, DELETE, DDL (recommended for scraper)
# - log_statement = 'all'  -> also SELECT (very verbose with bulk reads)
# =============================================================================

# --- Where to write logs ---
logging_collector = on
log_destination = 'stderr'
# Absolute path -> project logs folder (same place as app ConsoleLogger files).
# Relative path would be under the PostgreSQL data directory instead.
log_directory = 'H:/s/Work_job_board_scraper/job_board_scraper/logs'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = off

# --- What to log ---
# Recommended for JobBoardScraper: only data-changing queries
log_statement = 'mod'

# Uncomment for full SQL trace including SELECT (bulk reads will flood the log):
# log_statement = 'all'

# Log query duration
log_duration = on
log_min_duration_statement = 0

# Log lock waits longer than N ms (useful if scraper queue stalls)
log_lock_waits = on
deadlock_timeout = 1s

# --- Context (helps correlate scraper activity) ---
log_line_prefix = '%t [%p] %u@%d %a %h '
# %t timestamp, %p pid, %u user, %d database, %a app name, %h client host

log_connections = on
log_disconnections = on

# Application name from Npgsql (set in connection string: Application Name=JobBoardScraper)
# Example connection string addition:
#   ...;Database=jobs;Application Name=JobBoardScraper;

# --- Parameters in logged statements (PostgreSQL 13+) ---
# Shows bind parameter values in the log (careful: may contain personal data)
log_parameter_max_length = 0
# 0 = unlimited; use 1024 or 4096 to cap size

# --- Optional: log slow queries only ---
# log_min_duration_statement = 100
# log_statement = 'none'

# --- Optional: CSV log format (easier to parse in Excel/scripts) ---
# log_destination = 'csvlog'
# logging_collector = on
